services:
  web:
    image: ghcr.io/pheme/pheme:development
    build:
      context: .
      target: development
    ports:
      - "127.0.0.1:3306:3306" # MariaDB
      - "127.0.0.1:6025:6025" # Centrifugo
      - "127.0.0.1:6379:6379" # Redis
    environment:
      VAR_DUMPER_FORMAT: server
      VAR_DUMPER_SERVER: host.docker.internal:9912
    volumes:
      - $PWD/util/local_ssl/default.crt:/var/pheme/storage/acme/ssl.crt:ro
      - $PWD/util/local_ssl/default.key:/var/pheme/storage/acme/ssl.key:ro
      - $PWD/frontend/node_modules:/var/pheme/www/frontend/node_modules
      - $PWD/vendor:/var/pheme/www/vendor
      - $PWD:/var/pheme/www
    extra_hosts:
      - "host.docker.internal:host-gateway"

[program:sftpgo]
directory=/var/pheme/sftpgo
command=sftpgo --config-dir=/var/pheme/sftpgo serve -l ""
user=pheme
priority=700
numprocs=1
autostart=true
autorestart=true

stopasgroup=true
killasgroup=true

stdout_logfile=/var/pheme/www_tmp/service_sftpgo.log
stdout_logfile_maxbytes=5MB
stdout_logfile_backups=5
redirect_stderr=true

stdout_events_enabled = true
stderr_events_enabled = true
